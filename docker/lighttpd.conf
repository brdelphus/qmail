# Lighttpd configuration for qmailadmin
# Minimal setup for CGI-based qmailadmin interface

server.modules = (
    "mod_access",
    "mod_alias",
    "mod_cgi",
    "mod_redirect",
)

server.document-root = "/var/www/qmailadmin"
server.port = 80
server.bind = "0.0.0.0"

# Run as vpopmail so CGI can access vpopmail data
server.username = "vpopmail"
server.groupname = "vchkpw"

# Logging to stdout/stderr for runit capture
server.errorlog = "/dev/stderr"
accesslog.filename = "/dev/stdout"

# MIME types
mimetype.assign = (
    ".html" => "text/html",
    ".htm"  => "text/html",
    ".css"  => "text/css",
    ".js"   => "application/javascript",
    ".png"  => "image/png",
    ".gif"  => "image/gif",
    ".jpg"  => "image/jpeg",
    ".ico"  => "image/x-icon",
)

# Default index files
index-file.names = ("index.html", "index.htm")

# CGI configuration for qmailadmin
cgi.assign = (".cgi" => "")
$HTTP["url"] =~ "^/cgi-bin/" {
    cgi.assign = ("" => "")
}

# Redirect root to qmailadmin
url.redirect = ("^/$" => "/cgi-bin/qmailadmin")

# Static content handling
static-file.exclude-extensions = (".cgi")
