# Lighttpd configuration for qmailadmin and vqadmin
# CGI-based admin interfaces for vpopmail

server.modules = (
    "mod_access",
    "mod_alias",
    "mod_cgi",
    "mod_redirect",
    "mod_authn_file",
    "mod_auth",
)

server.document-root = "/var/www/qmailadmin"
server.port = 80
server.bind = "0.0.0.0"

# Run as vpopmail so CGI can access vpopmail data
server.username = "vpopmail"
server.groupname = "vchkpw"

# Logging to stdout/stderr for runit capture
server.errorlog = "/dev/stderr"
accesslog.filename = "/dev/stdout"

# MIME types
mimetype.assign = (
    ".html" => "text/html",
    ".htm"  => "text/html",
    ".css"  => "text/css",
    ".js"   => "application/javascript",
    ".png"  => "image/png",
    ".gif"  => "image/gif",
    ".jpg"  => "image/jpeg",
    ".ico"  => "image/x-icon",
)

# Default index files
index-file.names = ("index.html", "index.htm")

# CGI configuration
cgi.assign = (".cgi" => "")
$HTTP["url"] =~ "^/cgi-bin/" {
    cgi.assign = ("" => "")
}

# vqadmin requires HTTP basic auth (system-level admin)
$HTTP["url"] =~ "^/cgi-bin/vqadmin" {
    auth.backend = "htpasswd"
    auth.backend.htpasswd.userfile = "/var/qmail/control/vqadmin.htpasswd"
    auth.require = ("" => (
        "method" => "basic",
        "realm" => "vqadmin",
        "require" => "valid-user"
    ))
}

# Alias for vqadmin assets and ACME challenge (Let's Encrypt HTTP-01)
alias.url = (
    "/vqadmin/assets/"            => "/var/www/qmailadmin/cgi-bin/vqadmin/assets/",
    "/.well-known/acme-challenge/" => "/var/www/acme/.well-known/acme-challenge/"
)

# Serve ACME challenge files as static — no auth, no CGI
$HTTP["url"] =~ "^/\.well-known/acme-challenge/" {
    auth.require = ()
    cgi.assign = ()
}

# Redirect root to qmailadmin
url.redirect = ("^/$" => "/cgi-bin/qmailadmin")

# Static content handling
static-file.exclude-extensions = (".cgi")
