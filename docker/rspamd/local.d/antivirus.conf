# ClamAV antivirus scanning via clamd TCP socket.
# rspamd owns virus scanning; simscan's SIMSCAN_CLAM should be set to "no".
clamav {
  action        = "reject";
  message       = "Virus found: ${VIRUS}";
  servers       = "clamav:3310";
  scan_mime_parts  = true;
  scan_text_mime   = false;
  scan_image_mime  = false;
  max_size      = 20971520;   # 20 MB — matches QMAIL_DATABYTES default
  timeout       = 30.0;
  retransmits   = 2;
  log_clean     = false;

  # Fail-open: if clamd is unreachable, pass the message through rather than
  # soft-rejecting. Set to "soft reject" to fail closed instead.
  patterns_fail {
    CLAM_VIRUS_FAIL = "^failed$";
  }
}
