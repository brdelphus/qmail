# Apache Tika — attachment text extraction
# Tika plugin loaded from lua.local.d/tika.lua reads this section.
# rspamd submits binary attachments (PDF, DOCX, XLSX, …) to Tika over HTTP.
# Extracted plain text triggers TIKA_EXTRACTED symbol (score 0, informational).
# Tika is optional: if the container is not running, rspamd skips extraction
# silently (timeout_symbol is not set, so no penalty on failure).

url     = "http://tika:9998";
timeout = 15.0;   # seconds — Tika cold-starts slowly on first request

# Limit extraction to common document types
mime_types = [
    "application/pdf",
    "application/msword",
    "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
    "application/vnd.ms-excel",
    "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
    "application/vnd.ms-powerpoint",
    "application/vnd.openxmlformats-officedocument.presentationml.presentation",
    "application/rtf",
    "text/html",
];
