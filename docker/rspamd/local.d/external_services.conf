# Oletools — Office macro scanning via olefy/olevba.
# rspamd sends Office attachments to olefy over TCP; olevba analyses them and
# returns capability flags. rspamd maps the flags to symbols (see below).
# Composites and reject actions are defined in composites.conf / force_actions.conf.
#
# Fail-open: if the oletools container is not running, rspamd times out and
# sets no symbols — mail passes through without macro scanning.
# Enable the container with: docker compose --profile macros up

oletools {
    type     = "oletools";
    servers  = "oletools:11343";
    timeout  = 15.0;
    extended = true;   # report all macro flags; fires for any macro, not just autoexec+non-hex-suspicious

    log_clean  = false;
    log_symbol = true;

    # Symbols set from olevba output flags:
    #   OLETOOLS_MACRO          — any macro present            (A)
    #   OLETOOLS_WRITE          — macro writes to disk         (W)
    #   OLETOOLS_EXECUTE        — macro executes shell/process (X)
    #   OLETOOLS_SUSPICIOUS_FLAG — olevba 'suspicious' keyword (S/FLAG)
    #   OLETOOLS_VBASTOMP       — VBA stomping detected        (V)
    #   OLETOOLS_FAIL           — olevba returned a scan error
    symbol_fail = "OLETOOLS_FAIL";

    # Only scan Office document types — skip images, text, archives
    mime_types = [
        "application/msword",
        "application/vnd.ms-excel",
        "application/vnd.ms-powerpoint",
        "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
        "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
        "application/vnd.openxmlformats-officedocument.presentationml.presentation",
        "application/vnd.ms-office",
        "application/vnd.ms-word.document.macroenabled.12",
        "application/vnd.ms-excel.sheet.macroenabled.12",
        "application/rtf",
    ];

    extensions = ["doc", "dot", "docx", "docm", "dotx", "dotm",
                  "xls", "xlt", "xlsx", "xlsm", "xltx", "xltm", "xlam",
                  "ppt", "pot", "pptx", "pptm", "potx", "potm", "ppam",
                  "rtf"];
}
