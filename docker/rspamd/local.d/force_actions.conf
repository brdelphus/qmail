# Force reject/soft-reject on oletools macro detection.
# OLETOOLS is set by the external_services oletools handler when any macro is
# detected (extended = true mode). OLETOOLS_DETECTED composite re-exposes it
# with a high score; rejecting on either is equivalent.

rules {
    OLETOOLS_DETECTED {
        action  = "reject";
        message = "Message rejected: Office attachment contains macros";
        require_action = ["no action", "greylist", "add header", "rewrite subject"];
    }

    OLETOOLS_FAIL {
        # Soft-reject on scan error — ask the sender to retry rather than silently passing
        action  = "soft reject";
        message = "Macro scanning temporarily unavailable — please try again shortly";
        require_action = ["no action", "greylist"];
    }
}
