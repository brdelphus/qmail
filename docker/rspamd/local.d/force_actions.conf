# Force reject/soft-reject on oletools macro detection composites.
# Scores in composites.conf (20.0) are well above the default reject threshold,
# but force_actions ensures rejection regardless of other symbol scores.

rules {
    OLETOOLS_MACRO_MRAPTOR {
        action  = "reject";
        message = "Message rejected: Office attachment contains macros with auto-exec and write/execute capabilities";
        # Only force-reject on messages that would otherwise pass or get headers
        require_action = ["no action", "greylist", "add header", "rewrite subject"];
    }

    OLETOOLS_MACRO_SUSPICIOUS {
        action  = "reject";
        message = "Message rejected: Office attachment contains suspicious macro indicators";
        require_action = ["no action", "greylist", "add header", "rewrite subject"];
    }

    OLETOOLS_FAIL {
        # Soft-reject on scan error — ask the sender to retry rather than silently passing
        action  = "soft reject";
        message = "Macro scanning temporarily unavailable — please try again shortly";
        require_action = ["no action", "greylist"];
    }
}
