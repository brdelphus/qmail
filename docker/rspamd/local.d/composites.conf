# Composite symbols for oletools macro detection.
# Base symbols are set by the external_services oletools handler (external_services.conf).
#
# Notation used in TODO (from Mailu):
#   A = OLETOOLS_MACRO            (any macro present)
#   W = OLETOOLS_WRITE            (macro writes to disk)
#   X = OLETOOLS_EXECUTE          (macro executes shell/process)
#   FLAG = OLETOOLS_SUSPICIOUS_FLAG (olevba suspicious keyword)
#   VBASTOMP = OLETOOLS_VBASTOMP  (VBA stomping)

# mraptor: two or more of auto-exec, write, execute — classic malware pattern
OLETOOLS_MACRO_MRAPTOR {
    expression  = "(OLETOOLS_MACRO & OLETOOLS_WRITE) | (OLETOOLS_MACRO & OLETOOLS_EXECUTE) | (OLETOOLS_WRITE & OLETOOLS_EXECUTE)";
    score       = 20.0;
    description = "Office document with mraptor-pattern macros (auto-exec + write or execute)";
    group       = "oletools";
}

# suspicious: any single high-risk indicator
OLETOOLS_MACRO_SUSPICIOUS {
    expression  = "OLETOOLS_SUSPICIOUS_FLAG | OLETOOLS_VBASTOMP | OLETOOLS_MACRO";
    score       = 20.0;
    description = "Office document with suspicious macro indicators (olevba flag, VBA stomp, or any macro)";
    group       = "oletools";
}
