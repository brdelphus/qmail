# Composite symbols for oletools macro detection.
# The external_services oletools handler sets the base OLETOOLS symbol when
# any macro is detected (extended = true mode). Sub-symbols like OLETOOLS_MACRO
# do not exist in the standard plugin — only OLETOOLS is produced.
#
# OLETOOLS_FAIL is set by symbol_fail in external_services.conf on scan error.

# Any macro detected in an Office attachment — force-reject in force_actions.conf
OLETOOLS_DETECTED {
    expression  = "OLETOOLS";
    score       = 20.0;
    description = "Office document with macros detected";
    group       = "oletools";
}
