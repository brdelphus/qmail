services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASS:-changeme_root}
      MARIADB_DATABASE: ${MYSQL_DB:-vpopmail}
      MARIADB_USER: ${MYSQL_USER:-vpopmail}
      MARIADB_PASSWORD: ${MYSQL_PASS:-changeme}
      # Greylisting DB — created by mariadb-init/01-greylisting.sh on first start
      GREYLIST_DB: ${GREYLIST_DB:-greylisting}
      GREYLIST_USER: ${GREYLIST_USER:-greylisting}
      GREYLIST_PASS: ${GREYLIST_PASS:-changeme_grey}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./mariadb-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  qmail:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        VPOPMAIL_AUTH: mysql
    image: qmail:latest
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      # ── Server identity ──────────────────────────────────────────────────────
      QMAIL_ME: ${QMAIL_ME:-mail.example.com}
      QMAIL_DOMAIN: ${QMAIL_DOMAIN:-}

      # ── MariaDB — must match the mariadb service above ───────────────────────
      MYSQL_HOST: mariadb
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DB: ${MYSQL_DB:-vpopmail}
      MYSQL_USER: ${MYSQL_USER:-vpopmail}
      MYSQL_PASS: ${MYSQL_PASS:-changeme}

      # ── Queue / concurrency ──────────────────────────────────────────────────
      QMAIL_SOFTLIMIT: ${QMAIL_SOFTLIMIT:-64000000}
      QMAIL_CONCURRENCY_INCOMING: ${QMAIL_CONCURRENCY_INCOMING:-200}
      QMAIL_CONCURRENCY_REMOTE: ${QMAIL_CONCURRENCY_REMOTE:-20}
      QMAIL_CONCURRENCY_LOCAL: ${QMAIL_CONCURRENCY_LOCAL:-10}
      QMAIL_DATABYTES: ${QMAIL_DATABYTES:-20000000}
      QMAIL_MAXRCPT: ${QMAIL_MAXRCPT:-100}
      QMAIL_QUEUELIFETIME: ${QMAIL_QUEUELIFETIME:-272800}

      # ── Feature layer toggles ─────────────────────────────────────────────────
      # Each feature can be owned by "rspamd" (default) or "qmail".
      # The active layer is enabled; the inactive layer is automatically disabled.
      # Applies to both the qmail and rspamd containers (same vars, mirrored logic).
      SPF_LAYER: ${SPF_LAYER:-rspamd}
      DKIM_VERIFY_LAYER: ${DKIM_VERIFY_LAYER:-rspamd}
      DNSBL_LAYER: ${DNSBL_LAYER:-rspamd}
      SURBL_LAYER: ${SURBL_LAYER:-rspamd}
      # DNSBL servers used when DNSBL_LAYER=qmail (space-separated, prefix - for hard reject)
      QMAIL_DNSBL_SERVERS: ${QMAIL_DNSBL_SERVERS:-}

      # ── SMTP behaviour ───────────────────────────────────────────────────────
      # QMAIL_SPFBEHAVIOR: only active when SPF_LAYER=qmail (0=off ignored then)
      QMAIL_SPFBEHAVIOR: ${QMAIL_SPFBEHAVIOR:-3}
      QMAIL_GREETDELAY: ${QMAIL_GREETDELAY:-5}
      # QMAIL_SURBL: only active when SURBL_LAYER=qmail (ignored otherwise)
      QMAIL_SURBL: ${QMAIL_SURBL:-0}
      QMAIL_CHKUSER_WRONGRCPTLIMIT: ${QMAIL_CHKUSER_WRONGRCPTLIMIT:-3}
      QMAIL_BRTLIMIT: ${QMAIL_BRTLIMIT:-2}
      QMAIL_BOUNCEFROM: ${QMAIL_BOUNCEFROM:-noreply}
      # Max messages an auth user/domain/IP may send per reset period (0=unlimited).
      # Written to control/relaylimits on first run — edit the file for per-user overrides.
      QMAIL_RELAY_LIMIT: ${QMAIL_RELAY_LIMIT:-1000}
      QMAIL_DUALSTACK: ${QMAIL_DUALSTACK:-0}
      QMAIL_GREYLISTING: ${QMAIL_GREYLISTING:-0}
      # Custom SPF failure explanation (leave empty for default message)
      # QMAIL_SPF_EXP: ${QMAIL_SPF_EXP:-}

      # ── SMTP run-script env vars (passed directly to qmail-smtpd) ────────────
      # HELO DNS check — validate HELO hostname against DNS (PLRIV = check modes)
      # HELO_DNS_CHECK: ${HELO_DNS_CHECK:-}
      # Reject messages with empty envelope sender (<>)
      # REJECTNULLSENDERS: ${REJECTNULLSENDERS:-}
      # Allow DKIM-signed messages where Subject is not in the h= tag (default: 1)
      UNSIGNED_SUBJECT: ${UNSIGNED_SUBJECT:-1}


      # ── TLS ──────────────────────────────────────────────────────────────────
      # Three options (set in .env):
      #
      #   1. Self-signed (default) — leave both empty; cert is auto-generated on
      #      first run for QMAIL_ME. Fine for testing, not for production.
      #
      #   2. Ready cert — point to PEM files already on the host or in a volume:
      #        QMAIL_TLS_CERT=/etc/ssl/mail/fullchain.pem
      #        QMAIL_TLS_KEY=/etc/ssl/mail/privkey.pem
      #      Uncomment the bind-mount in the volumes section below, then adjust
      #      the host path to wherever your cert files live.
      #
      #   3. Let's Encrypt via certbot — run:  docker compose run --rm certbot
      #      Cert path is set automatically if CERTBOT_DOMAIN is configured.
      #      After first issue, set in .env:
      #        QMAIL_TLS_CERT=/etc/letsencrypt/live/<domain>/fullchain.pem
      #        QMAIL_TLS_KEY=/etc/letsencrypt/live/<domain>/privkey.pem
      #      Restart qmail after each renewal to install the updated cert.
      #      If the cert files are missing at startup, qmail falls back to self-signed.
      QMAIL_TLS_CERT: ${QMAIL_TLS_CERT:-}
      QMAIL_TLS_KEY: ${QMAIL_TLS_KEY:-}
      # Alternative: pass cert/key as base64-encoded strings (no volume needed).
      # Takes precedence over QMAIL_TLS_CERT/KEY when both are set.
      #   base64 -w0 fullchain.pem   →  QMAIL_TLS_CERT_B64
      #   base64 -w0 privkey.pem     →  QMAIL_TLS_KEY_B64
      QMAIL_TLS_CERT_B64: ${QMAIL_TLS_CERT_B64:-}
      QMAIL_TLS_KEY_B64: ${QMAIL_TLS_KEY_B64:-}
      QMAIL_DH_BITS: ${QMAIL_DH_BITS:-2048}
      QMAIL_TLS_CIPHERS: ${QMAIL_TLS_CIPHERS:-HIGH:MEDIUM:!MD5:!RC4:!3DES:!LOW:!SSLv2:!SSLv3}

      # ── SNI (additional TLS domains) ──────────────────────────────────────────
      # Semicolon-separated triplets: domain:cert_path:key_path
      # e.g. "mail2.example.org:/etc/letsencrypt/.../fullchain.pem:/etc/letsencrypt/.../privkey.pem"
      QMAIL_SNI_CERTS: ${QMAIL_SNI_CERTS:-}

      # ── Relay / access control ────────────────────────────────────────────────
      # Comma-separated IPs/prefixes trusted to relay on port 25.
      # Loopback is always trusted. e.g. "192.168.1.,10.0.0.2"
      QMAIL_RELAY_NETS: ${QMAIL_RELAY_NETS:-}

      # ── Mail tapping ──────────────────────────────────────────────────────────
      # Semicolon-separated rules: TYPE:REGEX:DESTINATION
      # TYPE: F=from  T=to  A=all  e.g. "F:.*@example.com:archive@example.com"
      QMAIL_TAPS: ${QMAIL_TAPS:-}

      # ── qmail-spp greylisting plugin ─────────────────────────────────────────
      # Set GREYLIST_USER to enable: entrypoint writes control/mysql.cnf,
      # control/greylisting, and creates a default control/smtpplugins.
      # Uses the same MariaDB container as vpopmail (separate DB and user).
      # Leave GREYLIST_USER empty to disable (opt-in feature).
      GREYLIST_HOST: mariadb
      GREYLIST_DB: ${GREYLIST_DB:-greylisting}
      GREYLIST_USER: ${GREYLIST_USER:-}
      GREYLIST_PASS: ${GREYLIST_PASS:-changeme_grey}
      # GREYLIST_BLOCK_EXPIRE: ${GREYLIST_BLOCK_EXPIRE:-2}
      # GREYLIST_RECORD_EXPIRE: ${GREYLIST_RECORD_EXPIRE:-2000}
      # GREYLIST_RECORD_EXPIRE_GOOD: ${GREYLIST_RECORD_EXPIRE_GOOD:-36}
      # GREYLIST_LOGLEVEL: ${GREYLIST_LOGLEVEL:-4}

      # ── vqadmin HTTP auth ─────────────────────────────────────────────────────
      # Password is auto-generated (and printed to stdout) if VQADMIN_PASS is empty.
      VQADMIN_USER: ${VQADMIN_USER:-admin}
      VQADMIN_PASS: ${VQADMIN_PASS:-}

      # ── simscan (AV + spam via ClamAV + Rspamd) ──────────────────────────────
      # Master toggle — false bypasses simscan entirely (qmail-dkim → qmail-queue direct)
      SIMSCAN_ENABLE: ${SIMSCAN_ENABLE:-true}
      # simcontrol is written on first run from these vars; edit
      # /var/qmail/simscan/simcontrol directly for per-domain overrides.
      SIMSCAN_CLAM: ${SIMSCAN_CLAM:-no}              # ClamAV scanning — disabled; rspamd owns AV via antivirus module
      SIMSCAN_SPAM: ${SIMSCAN_SPAM:-yes}             # Rspamd spam scanning (yes/no)
      # Tag-only mode — rspamd is called and headers are added, but simscan never
      # rejects based on spam score. ClamAV blocking is unaffected.
      RSPAMD_TAG_ONLY: ${RSPAMD_TAG_ONLY:-false}
      SIMSCAN_SPAM_HITS: ${SIMSCAN_SPAM_HITS:-9.0}   # Spam score threshold
      SIMSCAN_SIZE_LIMIT: ${SIMSCAN_SIZE_LIMIT:-20000000}  # Max message bytes to scan (0=unlimited)
      SIMSCAN_ATTACH: ${SIMSCAN_ATTACH:-}            # Blocked extensions, semicolon-separated e.g. ".vbs;.lnk;.scr"
      SIMSCAN_DEBUG: ${SIMSCAN_DEBUG:-0}             # Debug level 0-4
      # clamdscan-wrapper connects to the clamav container INSTREAM API
      CLAMD_HOST: clamav
      CLAMD_PORT: ${CLAMD_PORT:-3310}
      # rspamd-spamc wrapper connects to the rspamd container HTTP API
      RSPAMD_HOST: rspamd
      RSPAMD_PORT: ${RSPAMD_PORT:-11333}

      # ── LMTP delivery to Dovecot container ──────────────────────────────────
      LMTP_HOST: dovecot
      LMTP_PORT: ${LMTP_PORT:-24}

      # ── Service toggles ─────────────────────────────────────────────────────
      # Enable/disable individual services. Disabled services don't start.
      QMAIL_SMTP: ${QMAIL_SMTP:-true}           # Port 25 (inbound mail)
      QMAIL_SMTPS: ${QMAIL_SMTPS:-true}         # Port 465 (implicit TLS)
      QMAIL_SUBMISSION: ${QMAIL_SUBMISSION:-true} # Port 587 (authenticated relay)
      QMAIL_HTTP: ${QMAIL_HTTP:-true}           # Port 80 (qmailadmin/vqadmin)
    ports:
      - "25:25"     # SMTP
      - "80:80"     # HTTP (qmailadmin)
      - "465:465"   # SMTPS
      - "587:587"   # Submission
    volumes:
      # Primary volume for qmail control files, queue, vpopmail etc:
      #   /srv/mail/qmail/control     ← /var/qmail/control
      #   /srv/mail/qmail/queue       ← /var/qmail/queue
      #   /srv/mail/vpopmail/etc      ← /home/vpopmail/etc
      - maildata:/srv/mail
      # Domain Maildirs — shared with Dovecot (both need write access)
      - dovecot_mail:/srv/mail/vpopmail/domains
      # ACME challenge webroot — written by certbot, served by lighttpd on /.well-known/
      - acme_webroot:/var/www/acme
      # Let's Encrypt certs — written by certbot, read by qmail entrypoint (option 3)
      - letsencrypt:/etc/letsencrypt:ro
      # Ready cert bind-mount — uncomment for option 2 and set QMAIL_TLS_CERT/KEY in .env
      # Adjust the host path to the directory containing your fullchain.pem + privkey.pem
      #- /etc/ssl/mail:/etc/ssl/mail:ro

  clamav:
    image: clamav/clamav:latest
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 300s   # ClamAV loads ~250 MB of virus definitions on startup

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  oletools:
    build:
      context: ..
      dockerfile: docker/oletools/Dockerfile
    image: oletools:latest
    # Optional — enable with the "macros" profile:
    #   docker compose --profile macros up
    #   docker compose --profile macros build oletools
    # When not running, rspamd times out and passes mail through (fail-open).
    profiles: ["macros"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "11343"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      OLEFY_BINDADDRESS: "0.0.0.0"
      OLEFY_BINDPORT: "11343"
      OLEFY_TMPDIR: /dev/shm
      OLEFY_LOGLEVEL: ${OLEFY_LOGLEVEL:-20}
    # port 11343 is internal only — rspamd connects over the compose network

  tika:
    image: apache/tika:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9998/tika"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      # JVM heap — increase if Tika OOMs on large attachments
      JAVA_OPTS: ${TIKA_JAVA_OPTS:--Xms128m -Xmx512m}
    # port 9998 is internal only — rspamd connects over the compose network

  rspamd:
    build:
      context: ..
      dockerfile: docker/rspamd/Dockerfile
    image: rspamd:latest
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      clamav:
        condition: service_started   # service_healthy would block for ~5 min (definition load)
      tika:
        condition: service_started   # rspamd connects lazily; no need to wait for healthy
    environment:
      # Web UI + controller password — hash is generated at startup from this value.
      # Change in .env; no manual hash generation needed.
      RSPAMD_PASSWORD: ${RSPAMD_PASSWORD:-changeme_rspamd}
      # ── Feature layer toggles — must match values in qmail service above ──────
      SPF_LAYER: ${SPF_LAYER:-rspamd}
      DKIM_VERIFY_LAYER: ${DKIM_VERIFY_LAYER:-rspamd}
      DNSBL_LAYER: ${DNSBL_LAYER:-rspamd}
      SURBL_LAYER: ${SURBL_LAYER:-rspamd}
    volumes:
      - ./rspamd/local.d:/etc/rspamd/local.d:ro
      - ./rspamd/lua.local.d:/etc/rspamd/lua.local.d:ro
      - rspamd_data:/var/lib/rspamd
    ports:
      - "11334:11334"   # Web UI
      # port 783 (spamc) is internal only — qmail/simscan connects over the compose network

  dovecot:
    build:
      context: ..
      dockerfile: docker/dovecot/Dockerfile
    image: dovecot:latest
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      qmail:
        condition: service_started
    environment:
      # ── MariaDB — must match the mariadb service above ───────────────────────
      MYSQL_HOST: mariadb
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DB: ${MYSQL_DB:-vpopmail}
      MYSQL_USER: ${MYSQL_USER:-vpopmail}
      MYSQL_PASS: ${MYSQL_PASS:-changeme}

      # ── Rspamd — for IMAPSieve spam/ham learning ──────────────────────────────
      # Dovecot pipes messages to rspamd /learnspam or /learnham (controller port)
      # when the user moves mail to/from the Junk or Spam folder.
      RSPAMD_HOST: rspamd
      RSPAMD_PORT: ${RSPAMD_PORT:-11333}
      RSPAMD_CONTROLLER_PORT: ${RSPAMD_CONTROLLER_PORT:-11334}
      RSPAMD_PASSWORD: ${RSPAMD_PASSWORD:-changeme_rspamd}

      # ── Service toggles ─────────────────────────────────────────────────────
      # Enable/disable individual protocols. Disabled services don't listen.
      # Default: SSL ports enabled, plain ports disabled.
      DOVECOT_IMAP: ${DOVECOT_IMAP:-false}    # Port 143 (plaintext)
      DOVECOT_IMAPS: ${DOVECOT_IMAPS:-true}   # Port 993 (SSL)
      DOVECOT_POP3: ${DOVECOT_POP3:-false}    # Port 110 (plaintext)
      DOVECOT_POP3S: ${DOVECOT_POP3S:-true}   # Port 995 (SSL)
      DOVECOT_SIEVE: ${DOVECOT_SIEVE:-true}   # Port 4190 (ManageSieve)
      DOVECOT_LMTP: ${DOVECOT_LMTP:-true}     # Port 24 (internal, for qmail)
    ports:
      - "110:110"   # POP3 (disabled by default)
      - "143:143"   # IMAP (disabled by default)
      - "993:993"   # IMAPS
      - "995:995"   # POP3S
      - "4190:4190" # ManageSieve
      # LMTP port 24 is NOT exposed — only reachable from qmail container
    volumes:
      # Domain Maildirs — shared with qmail (both need write access)
      - dovecot_mail:/srv/mail/vpopmail/domains
      # Read-only access to qmail control files (TLS certs, Sieve scripts)
      # qmail entrypoint builds servercert.pem from Let's Encrypt certs — dovecot reads that.
      - maildata:/srv/qmail:ro

  certbot:
    image: certbot/certbot:latest
    # Optional — only active with the "certbot" profile.
    # Runs once to issue/renew; does not stay running.
    #
    # Requires in .env:
    #   CERTBOT_EMAIL=you@example.com
    #   CERTBOT_DOMAIN=mail.yourdomain.com   (defaults to QMAIL_ME)
    #
    # Usage:
    #   docker compose --profile certbot run --rm certbot
    #   docker compose --profile certbot run --rm certbot renew   # explicit renew
    #   (cron renewal — adjust path):
    #   0 3 * * * docker compose --profile certbot -f /path/to/docker-compose.yml run --rm certbot
    profiles: ["certbot"]
    restart: "no"
    volumes:
      - acme_webroot:/var/www/acme
      - letsencrypt:/etc/letsencrypt
    environment:
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-}
      CERTBOT_DOMAIN: ${CERTBOT_DOMAIN:-${QMAIL_ME:-mail.example.com}}
    command: >
      certonly
        --webroot --webroot-path /var/www/acme
        --email $${CERTBOT_EMAIL}
        --agree-tos --non-interactive --keep-until-expiring
        -d $${CERTBOT_DOMAIN}

volumes:
  maildata:
  dovecot_mail:
  mariadb_data:
  clamav_data:
  redis_data:
  rspamd_data:
  acme_webroot:
  letsencrypt:
