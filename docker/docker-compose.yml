services:
  qmail:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        # vpopmail auth backend — default: cdb (no external DB required)
        # Other options: mysql | pgsql | ldap | passwd
        VPOPMAIL_AUTH: cdb
    image: qmail:latest
    restart: unless-stopped
    environment:
      # Required: fully-qualified domain name of this mail server
      QMAIL_ME: mail.example.com
      # Primary virtual domain — created in vpopmail on first run.
      # Defaults to the part of QMAIL_ME after the first dot if not set.
      QMAIL_DOMAIN: example.com
      # QMAIL_SOFTLIMIT: 64000000
      # QMAIL_CONCURRENCY_INCOMING: 20
      # QMAIL_CONCURRENCY_REMOTE: 20
      # QMAIL_CONCURRENCY_LOCAL: 10
      # QMAIL_DATABYTES: 20000000
      # QMAIL_MAXRCPT: 100
      # QMAIL_SPFBEHAVIOR: 3
      # TLS — provide paths to existing cert/key files (e.g. Let's Encrypt).
      # Both files must be accessible inside the container (mount via volume).
      # If omitted, a self-signed cert is generated on first run.
      # QMAIL_TLS_CERT: /etc/letsencrypt/live/mail.example.com/fullchain.pem
      # QMAIL_TLS_KEY:  /etc/letsencrypt/live/mail.example.com/privkey.pem
      # DH params bit size — 2048 (default, fast) or 4096 (slower, stronger)
      # QMAIL_DH_BITS: 2048
    ports:
      - "25:25"     # SMTP
      - "80:80"     # HTTP (qmailadmin)
      - "110:110"   # POP3
      - "143:143"   # IMAP
      - "465:465"   # SMTPS
      - "587:587"   # Submission
      - "993:993"   # IMAPS
      - "995:995"   # POP3S
    volumes:
      # Single volume — entrypoint seeds subdirs and symlinks on first run:
      #   /srv/mail/qmail/control     ← /var/qmail/control
      #   /srv/mail/qmail/queue       ← /var/qmail/queue
      #   /srv/mail/vpopmail/domains  ← /home/vpopmail/domains
      #   /srv/mail/vpopmail/etc      ← /home/vpopmail/etc
      - maildata:/srv/mail

volumes:
  maildata:
