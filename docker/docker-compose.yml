services:
  qmail:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        # vpopmail auth backend — default: cdb (no external DB required)
        # Other options: mysql | pgsql | ldap | passwd
        VPOPMAIL_AUTH: cdb
    image: qmail:latest
    restart: unless-stopped
    environment:
      # Required: fully-qualified domain name of this mail server
      QMAIL_ME: mail.example.com
      # Primary virtual domain — created in vpopmail on first run.
      # Defaults to the part of QMAIL_ME after the first dot if not set.
      QMAIL_DOMAIN: example.com
      # QMAIL_SOFTLIMIT: 64000000
      # QMAIL_CONCURRENCY_INCOMING: 20
      # QMAIL_CONCURRENCY_REMOTE: 20
      # QMAIL_CONCURRENCY_LOCAL: 10
      # QMAIL_DATABYTES: 20000000
      # QMAIL_MAXRCPT: 100
      # QMAIL_SPFBEHAVIOR: 3
      # QMAIL_GREETDELAY: 5
      # QMAIL_SURBL: 0
      # tcprules — relay access and recipient validation
      # Dual-stack IPv4+IPv6 — binds tcpserver on :: instead of 0.0.0.0 (requires Docker IPv6)
      # QMAIL_DUALSTACK: 0
      # Greylisting (jgreylist) — temporarily reject unknown senders on port 25 (0=off, 1=on)
      # QMAIL_GREYLISTING: 0
      # Mail tapping (qmail-taps-extended) — semicolon-separated rules TYPE:REGEX:DESTINATION
      # TYPE: F=from, T=to, A=all  e.g. "F:.*@example.com:archive@example.com"
      # QMAIL_TAPS: ""
      # tcprules — relay access and recipient validation
      # QMAIL_RELAY_NETS: "192.168.1.,10.0.0.2"  # comma-separated IPs/prefixes trusted to relay on port 25
      # QMAIL_CHKUSER_WRONGRCPTLIMIT: 3           # invalid recipients before disconnect (all ports)
      # TLS — provide paths to existing cert/key files (e.g. Let's Encrypt).
      # Both files must be accessible inside the container (mount via volume).
      # If omitted, a self-signed cert is generated on first run.
      # QMAIL_TLS_CERT: /etc/letsencrypt/live/mail.example.com/fullchain.pem
      # QMAIL_TLS_KEY:  /etc/letsencrypt/live/mail.example.com/privkey.pem
      # SNI — additional domains (semicolon-separated domain:cert:key triplets)
      # QMAIL_SNI_CERTS: "mail2.example.org:/etc/letsencrypt/live/mail2.example.org/fullchain.pem:/etc/letsencrypt/live/mail2.example.org/privkey.pem"
      # DH params bit size — 2048 (default, fast) or 4096 (slower, stronger)
      # QMAIL_DH_BITS: 2048
      # vqadmin (system admin) — password auto-generated if not set
      # VQADMIN_USER: admin
      # VQADMIN_PASS: changeme
    ports:
      - "25:25"     # SMTP
      - "80:80"     # HTTP (qmailadmin)
      - "110:110"   # POP3
      - "143:143"   # IMAP
      - "465:465"   # SMTPS
      - "587:587"   # Submission
      - "993:993"   # IMAPS
      - "995:995"   # POP3S
      - "4190:4190" # ManageSieve
    volumes:
      # Single volume — entrypoint seeds subdirs and symlinks on first run:
      #   /srv/mail/qmail/control     ← /var/qmail/control
      #   /srv/mail/qmail/queue       ← /var/qmail/queue
      #   /srv/mail/vpopmail/domains  ← /home/vpopmail/domains
      #   /srv/mail/vpopmail/etc      ← /home/vpopmail/etc
      - maildata:/srv/mail

volumes:
  maildata:
