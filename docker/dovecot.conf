# Dovecot — IMAP + IMAPS for qmail/vpopmail
# Maildir layout: /home/vpopmail/domains/<domain>/<user>/Maildir
# Authentication: vpopmail vchkpw via checkpassword

protocols = imap pop3

mail_location = maildir:/home/vpopmail/domains/%d/%n/Maildir

# TLS — cert is shared with qmail (combined PEM: cert + key in one file)
ssl = yes
ssl_cert = </var/qmail/control/servercert.pem
ssl_key  = </var/qmail/control/servercert.pem
ssl_dh   = </var/qmail/control/dh4096.pem

# Listeners
service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl  = yes
  }
}

service pop3-login {
  inet_listener pop3 {
    port = 110
  }
  inet_listener pop3s {
    port = 995
    ssl  = yes
  }
}

# Authentication via vpopmail's vchkpw (checkpassword protocol)
auth_mechanisms = plain login

passdb {
  driver = checkpassword
  args   = /home/vpopmail/bin/vchkpw
}

userdb {
  driver = static
  args   = uid=vpopmail gid=vchkpw home=/home/vpopmail/domains/%d/%n
}

# Run mail processes as vpopmail so Maildir access works
mail_uid = vpopmail
mail_gid = vchkpw

# Logging — stdout so svlogd captures it
log_path = /dev/stdout
info_log_path = /dev/stdout

# Disable Dovecot's own PID file (runit tracks the process)
base_dir = /run/dovecot
