# Dovecot — IMAP + POP3 + ManageSieve for qmail/vpopmail
# Maildir layout: /home/vpopmail/domains/<domain>/<user>/Maildir
# Authentication: vpopmail vchkpw via checkpassword
# Delivery: qmail → dovecot-lda → Sieve → Maildir

protocols = imap pop3 sieve

mail_location = maildir:/home/vpopmail/domains/%d/%n/Maildir

# TLS — cert is shared with qmail (combined PEM: cert + key in one file)
ssl = yes
ssl_cert = </var/qmail/control/servercert.pem
ssl_key  = </var/qmail/control/servercert.pem
ssl_dh   = </var/qmail/control/dh4096.pem

# Listeners
service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl  = yes
  }
}

service pop3-login {
  inet_listener pop3 {
    port = 110
  }
  inet_listener pop3s {
    port = 995
    ssl  = yes
  }
}

# ManageSieve — lets mail clients upload/manage Sieve scripts (RFC 5804)
service managesieve-login {
  inet_listener sieve {
    port = 4190
  }
}

# Authentication via vpopmail's vchkpw (checkpassword protocol)
auth_mechanisms = plain login

passdb {
  driver = checkpassword
  args   = /home/vpopmail/bin/vchkpw
}

userdb {
  driver = static
  args   = uid=vpopmail gid=vchkpw home=/home/vpopmail/domains/%d/%n
}

# Run mail processes as vpopmail so Maildir access works
mail_uid = vpopmail
mail_gid = vchkpw

# LDA — invoked by qmail-local via .qmail-default in each domain dir.
# Runs Sieve filters before writing to Maildir.
protocol lda {
  mail_plugins = $mail_plugins sieve
  postmaster_address = postmaster@%d
}

# Sieve plugin configuration
plugin {
  # Active script symlink — mail clients point ManageSieve here
  sieve = ~/.dovecot.sieve

  # Script collection directory managed via ManageSieve
  sieve_dir = ~/sieve

  # Global scripts run before the user's script (e.g. server-wide spam rules).
  # Drop .sieve files in this directory; they run in alphabetical order.
  # Compile after adding/changing: sievec /var/qmail/control/sieve/before.d/
  sieve_before = /var/qmail/control/sieve/before.d/

  # Global scripts run after the user's script (e.g. catch-all archiving).
  sieve_after = /var/qmail/control/sieve/after.d/
}

# SNI — per-domain certificates for additional hosted domains.
# Generated by the entrypoint from QMAIL_SNI_CERTS on every startup.
# Format per block:
#   local_name domain.tld {
#     ssl_cert = </path/to/fullchain.pem
#     ssl_key  = </path/to/privkey.pem
#   }
!include_try /var/qmail/control/dovecot-sni.conf

# Logging — stdout so svlogd captures it
log_path = /dev/stdout
info_log_path = /dev/stdout

# Disable Dovecot's own PID file (runit tracks the process)
base_dir = /run/dovecot
