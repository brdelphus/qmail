# Dovecot — IMAP + POP3 + ManageSieve + LMTP with SQL auth
# Maildir layout: /srv/mail/vpopmail/domains/<domain>/<user>/Maildir
# Authentication: SQL against MariaDB vpopmail schema
# Delivery: qmail → LMTP :24 → Sieve → Maildir
#
# Service listeners are configured in /etc/dovecot/conf.d/10-listeners.conf
# Generated by entrypoint.sh based on environment variables.

protocols = imap pop3 lmtp sieve

mail_location = maildir:/srv/mail/vpopmail/domains/%d/%n/Maildir

# TLS — cert shared via read-only mount from qmail volume
# maildata volume is mounted at /srv/qmail, with control files in qmail/control/
ssl = yes
ssl_cert = </srv/qmail/qmail/control/servercert.pem
ssl_key  = </srv/qmail/qmail/control/servercert.pem
ssl_dh   = </srv/qmail/qmail/control/dh4096.pem

# Include generated listener configuration
!include /etc/dovecot/conf.d/10-listeners.conf

# Authentication via SQL (vpopmail schema)
auth_mechanisms = plain login

passdb {
  driver = sql
  args   = /etc/dovecot/dovecot-sql.conf.ext
}

userdb {
  driver = sql
  args   = /etc/dovecot/dovecot-sql.conf.ext
}

# Run mail processes as vpopmail so Maildir access works
mail_uid = vpopmail
mail_gid = vchkpw

# LMTP — receives mail from qmail, runs Sieve, writes to Maildir
protocol lmtp {
  mail_plugins = $mail_plugins sieve
  postmaster_address = postmaster@%d
}

# Sieve plugin configuration
plugin {
  # Active script symlink — mail clients point ManageSieve here
  sieve = ~/.dovecot.sieve

  # Script collection directory managed via ManageSieve
  sieve_dir = ~/sieve

  # Global scripts run before the user's script (e.g. server-wide spam rules).
  # Drop .sieve files in this directory; they run in alphabetical order.
  # Compile after adding/changing: sievec /srv/qmail/qmail/control/sieve/before.d/
  sieve_before = /srv/qmail/qmail/control/sieve/before.d/

  # Global scripts run after the user's script (e.g. catch-all archiving).
  sieve_after = /srv/qmail/qmail/control/sieve/after.d/
}

# SNI — per-domain certificates for additional hosted domains.
# Generated by the qmail entrypoint from QMAIL_SNI_CERTS.
!include_try /srv/qmail/qmail/control/dovecot-sni.conf

# Logging — stdout so Docker captures it
log_path = /dev/stdout
info_log_path = /dev/stdout

# Dovecot runtime directory
base_dir = /run/dovecot
